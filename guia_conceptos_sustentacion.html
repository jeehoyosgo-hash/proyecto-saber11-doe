<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía de Conceptos — Saber 11</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --p:#3D008D;--pk:#ED1E79;--gold:#FDB913;--teal:#1D9E75;
  --bg:#0A0A1A;--s1:#12122A;--s2:#1A1A35;
  --border:rgba(237,30,121,0.18);--text:#F0EEF8;--muted:rgba(240,238,248,0.55);
  --grad:linear-gradient(140deg,#3D008D 0%,#ED1E79 100%);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.selector{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:32px;padding:32px;}
.selector h1{font-size:28px;font-weight:800;text-align:center;}
.selector h1 span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.selector p{font-size:16px;color:var(--muted);text-align:center;line-height:1.6;}
.person-btns{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
.person-btn{padding:24px 48px;border-radius:16px;border:1px solid var(--border);background:var(--s1);color:var(--text);font-size:20px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .2s;}
.person-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(237,30,121,0.2);}
.person-btn.j{border-color:rgba(127,119,221,0.5);}
.person-btn.y{border-color:rgba(29,158,117,0.5);}
.mode-label{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-align:center;}

.app{display:none;}
.app.active{display:block;}

.top-bar{background:var(--s1);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;min-height:52px;}
.tl{display:flex;align-items:center;gap:14px;}
.tlogo{font-size:14px;font-weight:800;}
.tlogo span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.pbadge{font-size:12px;font-weight:700;padding:4px 14px;border-radius:20px;}
.pbj{background:rgba(127,119,221,0.2);color:#AFA9EC;}
.pby{background:rgba(29,158,117,0.2);color:#5DCAA5;}
.tr{display:flex;align-items:center;gap:12px;}
.ptext{font-size:13px;color:var(--muted);}
.pbg{width:120px;height:6px;background:var(--s2);border-radius:3px;overflow:hidden;}
.pbf{height:100%;background:var(--grad);border-radius:3px;transition:width .4s;}
.cbtn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .2s;}
.cbtn:hover{border-color:var(--pk);color:var(--text);}

.content{max-width:860px;margin:0 auto;padding:28px 24px;}

.scard{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}
.sheader{display:flex;align-items:center;gap:14px;margin-bottom:24px;}
.snum{width:36px;height:36px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0;}
.stag{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.stitle{font-size:18px;font-weight:700;color:var(--text);}

/* TELEPROMPTER */
.sbox{background:var(--s2);border-radius:14px;padding:20px 24px;margin-bottom:14px;border-left:4px solid var(--pk);}
.sblabel{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--pk);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sbtext{font-size:16px;color:var(--text);line-height:1.9;}
.sbtext em{color:var(--gold);font-style:normal;font-weight:600;}

/* EJEMPLO CONCRETO */
.exbox{background:rgba(29,158,117,0.08);border:1px solid rgba(29,158,117,0.25);border-radius:12px;padding:14px 18px;margin-bottom:14px;display:flex;gap:12px;}
.exicon{font-size:18px;flex-shrink:0;margin-top:2px;}
.exlabel{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#5DCAA5;margin-bottom:4px;}
.extext{font-size:14px;color:var(--muted);line-height:1.6;}
.extext strong{color:var(--text);font-weight:600;}

/* CUIDADO */
.warnbox{background:rgba(253,185,19,0.06);border:1px solid rgba(253,185,19,0.25);border-radius:12px;padding:14px 18px;margin-bottom:14px;display:flex;gap:12px;}
.warnlabel{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
.warntext{font-size:14px;color:var(--muted);line-height:1.6;}
.warntext strong{color:var(--text);font-weight:600;}

/* FORMULAS — accordion */
.facc{border:1px solid rgba(253,185,19,0.25);border-radius:12px;margin-bottom:14px;overflow:hidden;}
.facc-h{padding:14px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .15s;}
.facc-h:hover{background:rgba(253,185,19,0.05);}
.facc-title{font-size:14px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:8px;}
.facc-body{padding:0 18px;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .2s;}
.facc-body.open{max-height:1600px;padding:16px 18px;border-top:1px solid rgba(253,185,19,0.15);}
.fchev{transition:transform .3s;font-size:12px;color:var(--muted);}
.fchev.open{transform:rotate(180deg);}

.fblock{margin-bottom:20px;}
.fblock:last-child{margin-bottom:0;}
.fblock-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;}
.frow{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.fsym{font-family:'Fira Code',monospace;font-size:15px;color:var(--gold);font-weight:600;min-width:60px;}
.fdef{font-size:14px;color:var(--muted);line-height:1.6;}
.fdef strong{color:var(--text);font-weight:500;}
.fformula{font-family:'Fira Code',monospace;font-size:13px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin:10px 0;color:var(--gold);line-height:1.7;}
.fcalc{font-family:'Fira Code',monospace;font-size:13px;background:rgba(29,158,117,0.08);border:1px solid rgba(29,158,117,0.2);border-radius:8px;padding:10px 14px;margin:6px 0;color:#5DCAA5;line-height:1.7;}
.fnote{font-size:13px;color:var(--muted);line-height:1.6;margin-top:6px;font-style:italic;}

/* QA */
.qasec{margin-top:4px;}
.qatitle{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.qaitem{background:rgba(253,185,19,0.05);border:1px solid rgba(253,185,19,0.18);border-radius:12px;margin-bottom:8px;overflow:hidden;}
.qaq{padding:14px 18px;font-size:14px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:var(--text);transition:background .15s;}
.qaq:hover{background:rgba(253,185,19,0.08);}
.qaa{padding:0 18px;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .2s;}
.qaa.open{max-height:500px;padding:14px 18px;border-top:1px solid rgba(253,185,19,0.12);}
.qaa p{font-size:14px;color:var(--muted);line-height:1.7;margin:0;}
.qaa p strong{color:var(--text);font-weight:500;}
.qchev{transition:transform .3s;font-size:12px;color:var(--muted);}
.qchev.open{transform:rotate(180deg);}

/* NAV */
.navbar{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
.nbtn{padding:12px 28px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:15px;font-weight:600;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .2s;}
.nbtn:hover:not(:disabled){border-color:var(--pk);color:var(--text);}
.nbtn:disabled{opacity:0.3;cursor:not-allowed;}
.nbtn.nxt{background:var(--grad);border-color:transparent;color:#fff;}
.nbtn.nxt:hover{opacity:0.9;}
.sctr{font-size:14px;color:var(--muted);}

.done{text-align:center;padding:60px 32px;}
.done h2{font-size:28px;font-weight:800;margin-bottom:12px;}
.done h2 span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.done p{font-size:16px;color:var(--muted);line-height:1.7;max-width:500px;margin:0 auto 24px;}
</style>
</head>
<body>

<div class="selector" id="sel">
  <h1>Guía de <span>Conceptos</span></h1>
  <p>Estadística Aplicada — Saber 11: Muestreo &amp; DOE<br>Universidad Santo Tomás · 2026-I</p>
  <div class="mode-label">Selecciona quién estudia</div>
  <div class="person-btns">
    <button class="person-btn j" onclick="init('j')">Julián Toloza</button>
    <button class="person-btn y" onclick="init('y')">Yeison Hoyos</button>
  </div>
</div>

<div class="app" id="app">
  <div class="top-bar">
    <div class="tl">
      <div class="tlogo"><span>Conceptos</span> · Saber 11</div>
      <span class="pbadge" id="badge"></span>
    </div>
    <div class="tr">
      <span class="ptext" id="ptext">1/5</span>
      <div class="pbg"><div class="pbf" id="pbf" style="width:20%"></div></div>
      <button class="cbtn" onclick="back()">Cambiar persona</button>
    </div>
  </div>
  <div class="content" id="cont"></div>
</div>

<script>
const D = {
/* ─────────────────────────────────────────────
   JULIÁN: Fase I — Muestreo y estimación
───────────────────────────────────────────── */
j: [
  {
    tag:'Bloque 1 · Fundamentos', title:'¿Qué es el muestreo y por qué lo usamos?',
    script:`El muestreo es la técnica con la que elegimos una parte de la población para estudiarla, en lugar de estudiar a todos. La razón es simple: estudiar los <em>7.1 millones</em> de registros del ICFES sería imposible en tiempo y recursos.

Lo que hacemos es tomar una <em>muestra representativa</em> — un subconjunto que refleja bien a toda la población — y con ella estimamos parámetros como la media del puntaje nacional. La clave está en "representativa": si la muestra está sesgada, las conclusiones serán incorrectas aunque tengamos muchos datos.

En nuestro proyecto usamos <em>muestreo estratificado por estrato socioeconómico</em> porque el rendimiento varía sistemáticamente entre estratos. Dividir en estratos garantiza que no nos queden, por azar, casi todos los datos de un solo estrato.`,
    ejemplo:{icon:'📌',h:'Analogía para no olvidar',a:'Si quieres saber qué tan dulce está una olla de sopa, no te la tomas entera — pruebas una cucharada. Pero primero revuelves bien (= aleatorización). Si no revuelves y la cucharada es de la superficie, puede que esté más salada que el fondo (= sesgo).'},
    warning:{h:'Distinción clave en el examen',a:'<strong>Parámetro</strong> (μ, σ²) = dato real de toda la población — nunca lo conocemos con certeza. <strong>Estadístico</strong> (x̄, S²) = lo que calculamos de la muestra. La estimación convierte estadísticos en estimadores de parámetros.'},
    formulas:[
      {
        title:'Tipos de muestreo que debemos saber explicar',
        items:[
          {sym:'MAS',def:'<strong>Muestreo Aleatorio Simple:</strong> cada elemento tiene la misma probabilidad de ser elegido. Es el más sencillo pero puede sub-representar grupos pequeños.'},
          {sym:'Estrat.',def:'<strong>Muestreo Estratificado:</strong> dividimos la población en estratos (grupos homogéneos) y muestreamos de cada uno. Garantiza representación de todos los grupos. → Este usamos nosotros.'},
          {sym:'Sist.',def:'<strong>Muestreo Sistemático:</strong> elegimos cada k-ésimo elemento de una lista. Riesgo: si hay un patrón cada k elementos, hay sesgo.'},
          {sym:'Congl.',def:'<strong>Muestreo por Conglomerados:</strong> muestreamos grupos completos (ej: colegios) en vez de individuos. Más barato pero menos preciso.'},
        ],
        nota:'La elección del método depende de la estructura de la población y de los recursos disponibles. En nuestro caso el estrato socioeconómico es una fuente de variabilidad conocida → estratificado es óptimo.'
      }
    ],
    qa:[
      {q:'¿Por qué no hicieron un censo (n=7.1M)?',a:'Tres razones: (1) tiempo — descargar y procesar 7.1M registros por la API del ICFES es inviable en semestres; (2) costo computacional — el ANOVA con 7M filas requeriría memoria masiva; (3) innecesario — con n=841 bien diseñado la estimación ya tiene margen de error ±3 pts, que es suficiente para nuestros objetivos.'},
      {q:'¿Qué es el sesgo de muestreo?',a:'Es el error sistemático que ocurre cuando la muestra no representa bien a la población. Por ejemplo, si solo descargáramos registros de estudiantes bogotanos, la media estimada sería mayor que la nacional real. El muestreo aleatorio y estratificado minimiza este sesgo.'}
    ]
  },
  {
    tag:'Bloque 2 · Tamaño de muestra', title:'¿Cómo calculamos n = 841?',
    script:`Para calcular el tamaño de muestra necesitamos fijar tres cosas: el <em>nivel de confianza</em> (cuánta seguridad queremos), el <em>margen de error</em> (cuánto error toleramos) y una <em>estimación de la varianza</em> (qué tan dispersos están los datos).

Primero tomamos un <em>piloto de 300 observaciones</em> para estimar la varianza: S²=1,968.5. Con eso y usando Z=1.96 (95% de confianza) y e=3 puntos de margen de error, la fórmula nos dio <em>n = 841</em>.

La intuición es: si todos los estudiantes sacaran el mismo puntaje (S²=0), bastaría con medir uno solo. Si la dispersión es enorme, necesitamos muchos más. La fórmula balancea ese trade-off.`,
    ejemplo:{icon:'🎯',h:'El trade-off de precisión',a:'<strong>e=3 pts, n=841.</strong> Si quisiéramos e=1 pt (tres veces más preciso), n subiría a ~7,558 — nueve veces más datos. Ser más preciso es caro. Por eso elegimos e=3, que representa menos del 1% de la escala total de Saber 11 (≈100 a 500 pts).'},
    warning:{h:'Corrección de población finita',a:'La fórmula incluye N en el denominador para corregir el hecho de que la población es finita. Con N=7.1M >> n=841, el factor de corrección finita ≈ 1, así que prácticamente no cambia el resultado. Si N fuera 1,000, sí cambiaria mucho.'},
    formulas:[
      {
        title:'Fórmula del tamaño de muestra (población finita)',
        items:[
          {sym:'N',def:'<strong>Tamaño poblacional</strong> = 7,109,704 registros ICFES en datos.gov.co'},
          {sym:'Z',def:'<strong>Valor crítico normal</strong> = 1.96 para 95% de confianza. (Si fuera 99% → Z=2.576, necesitaríamos más muestra.)'},
          {sym:'S²',def:'<strong>Varianza estimada</strong> = 1,968.5 — obtenida del piloto de 300 obs. Mide dispersión del puntaje.'},
          {sym:'e',def:'<strong>Margen de error</strong> = 3 pts — el máximo error que aceptamos. El IC tendrá ancho total ±3 puntos.'},
          {sym:'n',def:'<strong>Resultado</strong> = 841 observaciones — redondeado hacia arriba para no quedarnos cortos.'},
        ],
        formula:'n = ⌈ (N · Z² · S²) / (N · e² + Z² · S²) ⌉',
        calculo:'n = ⌈ (7,109,704 · 3.8416 · 1,968.5) / (7,109,704 · 9 + 3.8416 · 1,968.5) ⌉\nn = ⌈ 53,842,186 / 64,025 ⌉ = ⌈ 840.88 ⌉ = 841',
        nota:'La muestra piloto de 300 es estándar: suficiente para estimar S² con estabilidad, sin gastar observaciones de la muestra definitiva.'
      },
      {
        title:'¿Por qué estratificado y no MAS?',
        items:[
          {sym:'Var(MAS)',def:'Con MAS toda la dispersión entre estratos queda en el error → varianza del estimador más alta.'},
          {sym:'Var(Est.)',def:'Con estratificado esa dispersión entre estratos se controla → varianza del estimador más baja con el mismo n.'},
        ],
        calculo:'Varianza estimador estratificado ≤ Varianza estimador MAS\n(cuando la varianza entre estratos es grande → nuestro caso: estrato 1 ≈ 220 pts, estrato 6 ≈ 290 pts)',
        nota:'En términos simples: el estratificado es más eficiente porque aprovecha que sabemos de antemano que los estratos son diferentes.'
      }
    ],
    qa:[
      {q:'¿Por qué el piloto fue de 300 y no de otro número?',a:'300 es suficiente para que S² converja a un valor estable. Con menos de 100 obs, S² puede variar mucho entre corridas. Con más de 500 "gastamos" observaciones que podrían ir a la muestra final. Es un balance estándar en la práctica estadística.'},
      {q:'Si la varianza real fuera el doble (S²=4000), ¿qué pasaría?',a:'El n subiría proporcionalmente: con S²=4,000 el resultado sería aproximadamente n≈1,700. Por eso es importante hacer el piloto — si la varianza real es mayor que la estimada, la muestra final puede ser insuficiente.'}
    ]
  },
  {
    tag:'Bloque 3 · Estimación', title:'Intervalo de confianza y estimador de razón',
    script:`Con los 841 estudiantes usamos el paquete <em>survey</em> de R, que incorpora los pesos del diseño estratificado. Eso es importante: no podemos simplemente calcular la media aritmética porque los estratos tienen diferente tamaño y se muestrean con diferente intensidad.

La media estimada fue <em>250.74 puntos</em>, con IC 95% de <em>[246.42, 255.06]</em>.

También usamos un <em>estimador de razón</em> para lectura crítica, usando matemáticas como variable auxiliar. Esto funciona porque matemáticas y lectura están correlacionadas: si un estudiante saca alto en una, tiende a sacar alto en la otra. Aprovechamos esa correlación para reducir la incertidumbre — el coeficiente de variación bajó de <em>0.88% a 0.78%</em>.`,
    ejemplo:{icon:'💡',h:'¿Qué significa "IC del 95%"?',a:'<strong>No</strong> significa que hay 95% de probabilidad de que μ esté en [246.42, 255.06]. Significa que si repitiéramos el muestreo 100 veces y construyéramos 100 intervalos, esperaríamos que 95 de ellos contengan el valor real de μ. Una vez calculado, el intervalo o contiene a μ o no — no hay probabilidad.'},
    warning:{h:'Confusión frecuente en sustentación',a:'El IC <strong>no</strong> es el margen de error que fijamos (±3 pts). Ese era el objetivo de diseño. El IC final salió ±4.33/2 ≈ ±2.16 pts — <strong>mejor que lo que pedimos</strong>, porque la varianza real fue menor que la del piloto.'},
    formulas:[
      {
        title:'Intervalo de Confianza (IC)',
        items:[
          {sym:'x̄',def:'<strong>Media muestral ponderada</strong> = 250.74 pts — estimación puntual'},
          {sym:'SE',def:'<strong>Error estándar</strong> = 2.21 pts. Mide la precisión de la estimación. Cuanto más chico, más precisa.'},
          {sym:'Z·SE',def:'<strong>Margen de error real</strong> = 1.96 × 2.21 = ±4.33/2 ≈ ±2.16 pts < 3 pts objetivo ✓'},
        ],
        formula:'IC = x̄ ± Z · SE = 250.74 ± 1.96 · 2.21',
        calculo:'IC = [250.74 − 4.33, 250.74 + 4.33] / 2\nIC = [246.42 , 255.06]',
        nota:'El IC no contiene el 0 y tiene una amplitud razonable. La estimación es válida y cumple el objetivo de precisión.'
      },
      {
        title:'Estimador de razón vs estimador simple',
        items:[
          {sym:'R̂',def:'<strong>Estimador de razón:</strong> usa una variable auxiliar X (matemáticas) correlacionada con Y (lectura crítica) para hacer la estimación más precisa.'},
          {sym:'ρ',def:'<strong>Correlación entre variables:</strong> si ρ es alta y positiva, el estimador de razón es siempre más eficiente que el simple.'},
          {sym:'CV',def:'<strong>Coeficiente de Variación</strong> = SE/media × 100. Simple: 0.88%, Razón: 0.78% → razón gana.'},
        ],
        formula:'R̂ = Ȳ / X̄ · μ_X',
        calculo:'CV simple    = 0.88%\nCV de razón  = 0.78%\nGanancia     = 0.10% → estimador de razón más eficiente ✓',
        nota:'La ganancia parece pequeña pero en estudios con millones de obs se traduce en necesitar menos datos para igual precisión.'
      }
    ],
    qa:[
      {q:'¿Qué significa "incorporar pesos del diseño"?',a:'En un muestreo estratificado proporcional, cada estrato aporta observaciones según su tamaño en la población. Si el estrato 1 tiene el 40% de la población, el 40% de la muestra viene de ahí. Los pesos corrigen por eso: una obs de un estrato sub-muestreado "vale más" al calcular la media global. Sin pesos, la media estaría sesgada.'},
      {q:'¿Por qué no usaron lectura como auxiliar para matemáticas en el estimador de razón?',a:'Podríamos haberlo hecho. Elegimos matemáticas como auxiliar para lectura porque en el contexto educativo colombiano la correlación matemáticas-lectura es alta y matemáticas es una prueba con menor variabilidad relativa — buen ancla. Pero técnicamente ambas direcciones son válidas.'}
    ]
  },
  {
    tag:'Bloque 4 · DOE — Diseño', title:'¿Qué es el DBCA y por qué lo elegimos?',
    script:`El Diseño en Bloques Completos al Azar, o <em>DBCA</em>, es nuestro diseño experimental. La idea es comparar dos tratamientos — colegio oficial vs. no oficial — mientras controlamos una fuente de variabilidad conocida: la jornada escolar.

El <em>bloque</em> es la jornada porque sabemos que afecta el puntaje: jornada completa promedia 280 pts, mañana 247 pts, noche 217 pts. Esa diferencia de 63 puntos entre extremos, si no la controlamos, contamina la comparación entre tipos de colegio.

Sin el bloque — es decir, con un <em>DCA</em> — esa variabilidad de jornada caería en el error residual, inflaría el CMError de 1,948 a ~3,200, y el estadístico F bajaría de 53.7 a ~32. El bloqueo es lo que hace al diseño <em>eficiente y preciso</em>.`,

    ejemplo:{icon:'✅',h:'¿Qué pasa si fallan los supuestos?',a:'<strong>Normalidad falla levemente</strong> (como nuestro caso): TCL protege con n grande → ANOVA válido. <strong>Homocedasticidad falla</strong>: alternativas son Welch-ANOVA (no asume igualdad de varianzas) o transformación Box-Cox. <strong>Independencia falla</strong>: hay que usar modelos con efectos correlacionados (ej: efectos mixtos).'},

y: [
  {
    tag:'Bloque 1 · Diseño exp.', title:'Vocabulario fundamental del DOE',
    script:`En todo diseño de experimentos hay un vocabulario que debemos dominar. El <em>factor</em> es la variable que manipulamos o comparamos — en nuestro caso, la naturaleza del colegio (oficial vs. no oficial). Los <em>niveles</em> son los valores que toma el factor — dos en total.

La <em>variable respuesta</em> es lo que medimos: el puntaje global de Saber 11. Los <em>tratamientos</em> son las condiciones que comparamos: colegio oficial y colegio no oficial.

El <em>bloque</em> es una variable que no nos interesa per se, pero que afecta la respuesta — la jornada escolar. Al bloquear "neutralizamos" su efecto para que no contamine la comparación de tratamientos.

    ejemplo:{icon:'🧪',h:'Mapeando nuestro proyecto al vocabulario',a:'Factor: naturaleza (oficial / no oficial). Niveles: 2. Bloques: jornada (completa, mañana, noche). Variable respuesta: puntaje global Saber 11. Réplicas: ≈55 estudiantes por celda (tratamiento × bloque). Unidad experimental: un estudiante.'},
    warning:{h:'Diseño observacional ≠ Experimento',a:'En un experimento verdadero <strong>asignamos</strong> aleatoriamente los sujetos a los tratamientos. Aquí los estudiantes ya están en sus colegios — no los asignamos nosotros. Por eso es diseño observacional: podemos detectar asociaciones pero <strong>no podemos afirmar causalidad</strong>.'},

  {
    tag:'Bloque 2 · Hipótesis', title:'Hipótesis nula y alternativa del ANOVA',
    script:`Antes de correr el ANOVA, debemos plantear las hipótesis formalmente.

La <em>hipótesis nula H₀</em> es que todos los tratamientos producen el mismo efecto: τ₁ = τ₂ = 0, es decir, no hay diferencia entre el puntaje promedio de los colegios oficiales y no oficiales, controlando por jornada.

El ANOVA prueba si la variabilidad explicada por los tratamientos es lo suficientemente grande comparada con el error aleatorio. Con <em>F=53.7 y p=1.88×10⁻¹²</em>, rechazamos H₀ con contundencia.`,
    ejemplo:{icon:'⚡',h:'¿Qué significa p=1.88×10⁻¹²?',a:'Si H₀ fuera verdadera (no hay diferencia real), la probabilidad de obtener un F tan extremo como 53.7 solo por azar es de 1.88 en un billón. En términos prácticos: es imposible que esta diferencia sea azar.'},
    warning:{h:'Error clásico de interpretación del p-valor',a:'El p-valor <strong>no</strong> es la probabilidad de que H₀ sea verdadera. Es la probabilidad de obtener datos tan extremos (o más) <strong>dado que H₀ es verdadera</strong>. Nunca decir "hay 1.88×10⁻¹² de probabilidad de que no haya diferencia".'},
    formulas:[

        title:'Planteamiento formal de hipótesis — DBCA',

let p=null,steps=[],cur=0;

function init(who){
  p=who; steps=D[who]; cur=0;
  document.getElementById('sel').style.display='none';
  document.getElementById('app').classList.add('active');
  document.getElementById('badge').textContent=who==='j'?'Julián Toloza':'Yeison Hoyos';
  document.getElementById('badge').className='pbadge '+(who==='j'?'pbj':'pby');
  render();
}
function back(){
  document.getElementById('sel').style.display='flex';
  document.getElementById('app').classList.remove('active');
}
function render(){
  const s=steps[cur],tot=steps.length,pct=((cur+1)/tot*100).toFixed(0);
  document.getElementById('ptext').textContent=(cur+1)+' / '+tot;
  document.getElementById('pbf').style.width=pct+'%';

  // Formulas HTML
  let fHTML='';
  if(s.formulas&&s.formulas.length){
    s.formulas.forEach(f=>{
      const rows=f.items.map(it=>`<div class="frow"><span class="fsym">${it.sym}</span><span class="fdef">${it.def}</span></div>`).join('');
      const fml=f.formula?`<div class="fformula">${f.formula}</div>`:'';
      const calc=f.calculo?`<div class="fcalc">${f.calculo.replace(/\n/g,'<br>')}</div>`:'';
      const note=f.nota?`<div class="fnote">💡 ${f.nota}</div>`:'';
      fHTML+=`<div class="fblock"><div class="fblock-title">${f.title}</div>${rows}${fml}${calc}${note}</div>`;
    });
  }

  // QA HTML
  let qaHTML='';
  if(s.qa&&s.qa.length){
    qaHTML=`<div class="qasec"><div class="qatitle"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Posibles preguntas del profesor</div>`+
    s.qa.map(q=>`<div class="qaitem"><div class="qaq" onclick="tqa(this)"><span>${q.q}</span><span class="qchev">▾</span></div><div class="qaa"><p>${q.a}</p></div></div>`).join('')+`</div>`;
  }

  // Example box
  const exHTML = s.ejemplo ? `<div class="exbox">
    <div class="exicon">${s.ejemplo.icon}</div>
    <div><div class="exlabel">Ejemplo / Analogía</div><div class="extext"><strong>${s.ejemplo.h}</strong> — ${s.ejemplo.a}</div></div>
  </div>` : '';

  // Warning box
  const warnHTML = s.warning ? `<div class="warnbox">
    <div style="font-size:18px;flex-shrink:0;margin-top:2px">⚠️</div>
    <div><div class="warnlabel">Cuidado / Distinción clave</div><div class="warntext"><strong>${s.warning.h}</strong> — ${s.warning.a}</div></div>
  </div>` : '';

  document.getElementById('cont').innerHTML=`
    <div class="scard">
      <div class="sheader">
        <div class="snum">${cur+1}</div>
        <div><div class="stag">${s.tag}</div><div class="stitle">${s.title}</div></div>

        <div class="sblabel">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>

        <div class="sbtext">${s.script.replace(/\n\n/g,'<br><br>').replace(/\n/g,' ')}</div>

            Fórmulas y definiciones detalladas
          </div>
          <span class="fchev">▾</span>
        </div>
        <div class="facc-body">${fHTML}</div>
      </div>

      ${qaHTML}

      <div class="navbar">
        <button class="nbtn" onclick="prev()" ${cur===0?'disabled':''}>← Anterior</button>
        <span class="sctr">${cur+1} de ${steps.length}</span>
        <button class="nbtn nxt" onclick="next()">${cur===steps.length-1?'Finalizar':'Siguiente →'}</button>
      </div>
    </div>`;
  window.scrollTo(0,0);
}
function next(){
  if(cur<steps.length-1){cur++;render();}
  else{
    document.getElementById('cont').innerHTML=`<div class="done"><h2>¡Listos para <span>sustentar</span>!</h2><p>Repasaron todos los conceptos. Si en la sustentación se les va un número — el dashboard lo tiene. Si se les va una fórmula — esta guía la tiene. Si se les va la lógica — la analogía los rescata.</p><button class="nbtn nxt" onclick="cur=0;render()" style="margin:0 auto;display:block">Volver al inicio</button></div>`;
  }
}
function prev(){if(cur>0){cur--;render();}}
function tqa(el){
  const a=el.nextElementSibling,c=el.querySelector('.qchev'),o=a.classList.contains('open');
  document.querySelectorAll('.qaa').forEach(x=>x.classList.remove('open'));
  document.querySelectorAll('.qchev').forEach(x=>x.classList.remove('open'));
  if(!o){a.classList.add('open');c.classList.add('open');}
}
function tform(el){
  const b=el.nextElementSibling,c=el.querySelector('.fchev'),o=b.classList.contains('open');
  b.classList.toggle('open',!o);c.classList.toggle('open',!o);
}
</script>
